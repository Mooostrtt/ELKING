<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>باقات الملك VIP</title>
  <style>
    :root { --bg: #0b1220; --card: #121d30; --gold: #c9a24b; --text: #e4e8f0; --text2: #7a8fa6; }
    body { background: var(--bg); color: var(--text); font-family: Tahoma, sans-serif; margin: 0; padding-bottom: 50px; }
    .nav { background: #090f1c; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
    .title { color: var(--gold); font-size: 24px; font-weight: bold; }
    .main { max-width: 600px; margin: auto; padding: 20px; }
    .co-title { color: var(--gold); font-size: 20px; margin: 30px 0 15px; border-right: 4px solid var(--gold); padding-right: 10px; }
    .pkg { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .pkg-info { font-size: 16px; }
    .pkg-price { color: var(--gold); font-weight: bold; font-size: 18px; }
    .btn-buy { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--card); padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #0b1220; color: white; }
  </style>
</head>
<body>
  <div class="nav"><div class="title">👑 EL KING VIP 👑</div></div>
  <div class="main">
    
    <!-- WE -->
    <div class="co-title">🩵 باقات وي جولد (تفعيل 1 و 16)</div>
    <div id="we-pkgs"></div>

    <!-- ORANGE -->
    <div class="co-title">🧡 باقات أورانج (تفعيل 1)</div>
    <div id="orange-pkgs"></div>

  </div>

  <div class="overlay" id="modal">
    <div class="modal">
      <h3>طلب شحن الباقة</h3>
      <input type="text" id="name" placeholder="الاسم بالكامل">
      <input type="tel" id="phone" placeholder="رقم الموبايل">
      <button class="btn-buy" style="width:100%" onclick="sendOrder()">إرسال الطلب للبوت</button>
      <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:red; margin-top:10px; width:100%">إلغاء</button>
    </div>
  </div>

  <script>
    const we = [
      { name: "20 جيجا & 1000 دقيقة", price: "270" },
      { name: "30 جيجا & 1500 دقيقة", price: "335" },
      { name: "40 جيجا & 2000 دقيقة", price: "410" },
      { name: "50 جيجا & 2000 دقيقة", price: "490" },
      { name: "60 جيجا & 2000 دقيقة", price: "570" },
      { name: "80 جيجا & 2000 دقيقة", price: "730" }
    ];
    const orange = [
      { name: "10 جيجا & 2000 دقيقة", price: "250" },
      { name: "14 جيجا & 2000 دقيقة", price: "300" },
      { name: "20 جيجا & 2000 دقيقة", price: "380" },
      { name: "30 جيجا & 2000 دقيقة", price: "500" },
      { name: "2000 دقيقة (بدون إنترنت)", price: "140" }
    ];

    let selectedPkg = "";

    function render(list, id) {
      document.getElementById(id).innerHTML = list.map(p => `
        <div class="pkg">
          <div class="pkg-info"><b>${p.name}</b><br><span class="pkg-price">${p.price} جنيه</span></div>
          <button class="btn-buy" onclick="openModal('${p.name}', '${p.price}')">اطلب</button>
        </div>
      `).join('');
    }

    function openModal(name, price) {
      selectedPkg = `${name} بسعر ${price}`;
      document.getElementById('modal').style.display = 'flex';
    }

    function sendOrder() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const msg = encodeURIComponent(`👑 طلب جديد:\nالعميل: ${name}\nالرقم: ${phone}\nالباقة: ${selectedPkg}`);
      window.open(`https://t.me/OrderDispatcherBot?start=${msg}`, '_blank');
    }

    render(we, 'we-pkgs');
    render(orange, 'orange-pkgs');
  </script>
</body>
</html>
