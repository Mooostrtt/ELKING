<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL KING - منصة الشحن الملكية</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --vodafone: #ff0000; --we: #bc00dd; --orange: #ff6600; --etisalat: #739600;
            --bg-dark: #0b0c10; --card-dark: #1f2833; --gold: #c5a059; --gold-glow: #e5c158;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: var(--bg-dark); color: #ffffff; padding-bottom: 90px;
            background-image: radial-gradient(circle at 50% 20%, #1f2833 0%, var(--bg-dark) 70%); min-height: 100vh;
        }
        header { background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(11,12,16,0) 100%); padding: 35px 20px; text-align: center; }
        header h1 { font-size: 42px; color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px var(--gold-glow); }
        header p { font-size: 13px; color: #86c232; margin-top: 8px; font-weight: 600; }
        .container { padding: 20px; max-width: 480px; margin: 0 auto; }
        .section-title { font-size: 18px; margin: 20px 0 15px 0; color: #fff; font-weight: bold; border-right: 4px solid var(--gold); padding-right: 10px; }
        
        .hidden { display: none !important; }
        .box { background: linear-gradient(145deg, #1f2833, #151b23); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); margin-top: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        label { display: block; font-size: 14px; color: #999; margin-bottom: 8px; font-weight: 600; }
        select, input[type="text"], input[type="file"] { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #333; background: #0b0c10; color: #fff; font-size: 15px; }
        
        button.btn-main { width: 100%; padding: 15px; background: linear-gradient(90deg, #c5a059 0%, #e5c158 100%); color: #000; border: none; font-weight: 800; border-radius: 12px; cursor: pointer; font-size: 16px; box-shadow: 0 5px 15px rgba(229,193,88,0.4); }
        .btn-back { width: 100%; background-color: transparent; color: #aaa; margin-top: 10px; padding: 10px; font-size: 14px; border: 1px solid #444; border-radius: 12px; cursor: pointer; }

        .grid-networks { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .net-card { 
            background: linear-gradient(145deg, #1f2833, #151b23); border-radius: 20px; padding: 35px 15px; 
            text-align: center; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .net-card:active { transform: scale(0.92); }
        
        .company-icon { font-size: 50px; margin-bottom: 15px; transition: 0.3s; }
        .net-card span { font-weight: 700; font-size: 17px; color: #e0e0e0; }

        .vf i { color: var(--vodafone); text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .we i { color: var(--we); text-shadow: 0 0 10px rgba(188,0,221,0.5); }
        .or i { color: var(--orange); text-shadow: 0 0 10px rgba(255,102,0,0.5); }
        .et i { color: var(--etisalat); text-shadow: 0 0 10px rgba(115,150,0,0.5); }

        .cash-box { background: #0b0c10; padding: 15px; border-radius: 12px; border: 1px solid #c5a059; text-align: center; margin-bottom: 20px; }
        .cash-num { font-size: 22px; color: var(--gold-glow); font-weight: bold; cursor: pointer; text-decoration: underline; display: inline-block; margin-top: 5px; letter-spacing: 1px; }
        .notes-box { background: rgba(229,193,88,0.1); border: 1px dashed var(--gold); padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; color: #e5c158; line-height: 1.5; }

        footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(11, 12, 16, 0.95); backdrop-filter: blur(10px); padding: 18px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; z-index: 100; }
        footer a { color: var(--gold-glow); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <h1>EL KING</h1>
        <p>النظام الملكي الموحد لشحن الباقات</p>
    </header>

    <div class="container">
        <div id="step-login">
            <div class="section-title">تسجيل دخول للمنصة:</div>
            <div class="box">
                <label>الاسم بالكامل:</label>
                <input type="text" id="login-name" placeholder="اكتب اسمك هنا">
                <label>رقم الموبايل:</label>
                <input type="text" id="login-phone" placeholder="01xxxxxxxxx">
                <button class="btn-main" onclick="handleLogin()">دخول المنصة</button>
            </div>
        </div>

        <div id="step-networks" class="hidden">
            <div class="section-title">أهلاً بك، اختر شبكة الشحن:</div>
            <div class="grid-networks">
                <div class="net-card vf" onclick="chooseNetwork('فودافون')"><i class="fa-solid fa-square-phone company-icon"></i><span>فودافون</span></div>
                <div class="net-card we" onclick="chooseNetwork('وي WE')"><i class="fa-solid fa-circle-nodes company-icon"></i><span>المصرية وي</span></div>
                <div class="net-card or" onclick="chooseNetwork('أورانج')"><i class="fa-solid fa-cube company-icon"></i><span>أورانج</span></div>
                <div class="net-card et" onclick="chooseNetwork('اتصالات')"><i class="fa-solid fa-tower-broadcast company-icon"></i><span>اتصالات</span></div>
            </div>
            <button class="btn-back" onclick="logout()">خروج</button>
        </div>

        <div id="step-details" class="hidden">
            <div class="section-title">إتمام عملية الشحن لـ (<span id="selected-net" style="color:var(--gold-glow)"></span>)</div>
            <div class="box">
                <div class="cash-box">
                    <label style="color: #fff;">ابعت على رقم الكاش وارفع الاسكرين:</label>
                    <div class="cash-num" onclick="copyCashNumber('01030982295')">01030982295</div>
                    <div style="font-size: 11px; color: #86c232; margin-top: 5px;">(اضغط على الرقم لنسخه تلقائياً)</div>
                </div>

                <div id="company-notes" class="notes-box hidden"></div>

                <div id="package-container">
                    <label>اختر الباقة المطلوبة:</label>
                    <select id="package-select"></select>
                    <label>رقم الموبايل المراد شحنه:</label>
                    <input type="text" id="user-phone" placeholder="01xxxxxxxxx">
                    <label>ارفع لقطة شاشة تأكيد الدفع:</label>
                    <input type="file" id="payment-img" accept="image/*">
                    <button class="btn-main" onclick="sendOrder()">تأكيد وإرسال الطلب الملكي 👑</button>
                </div>
                
                <div id="coming-soon-container" class="hidden" style="text-align: center; padding: 20px 0;">
                    <h2 style="color: var(--gold-glow); font-size: 26px;">قريباً...</h2>
                    <p style="color: #aaa; margin-top: 10px;">باقات فودافون سيتم إضافتها في القريب العاجل.</p>
                </div>
                <button class="btn-back" onclick="goBackToNetworks()">تغيير الشركة</button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKENS = [
            '8981096815:AAGla-W1OHp38pcMP9rLxrQ5tPNAhG5BTug',
            '8495228264:AAHxsa_rxvlaacbxpkrzOlLXkcC2aBiUDGo'
        ];
        const ADMIN_IDS = ['6539479322', '8701348489'];

        // داتا احتياطية ثابتة عشان لو سيرفر تليجرام اتأخر في الرد والموقع ميهنجش
        const backupPackages = {
            'وي WE': ['🔹 20 جيجا + 1000 دقيقة — 270 جنيه 🔥', '🔹 30 جيجا + 1500 دقيقة — 335 جنيه 🔥'],
            'فودافون': [],
            'أورانج': ['🍊 10جيجا & 2000دقيقة بــ250💥', '🍊 14جيجا & 2000دقيقة بــ300💥'],
            'اتصالات': ['متاح 3750ميكس اتصالات بـ95 جنيه فلوس', 'متاح 5100ميكس اتصالات بـ140ج فلوس']
        };

        const companyNotesData = {
            'وي WE': '📅 شروط الباقة: صالحة لمدة شهر (التفعيل يوم 1 ويوم 16)<br>📞 نظام المحاسبة: الدقيقة بدقيقة لكل الشبكات',
            'أورانج': '🚧 شروط الباقة: صالحة لمدة شهر، التفعيل يوم 1💥',
            'اتصالات': '💡 ملحوظة: كل الباقات السابقة تنفع لو مستلف شهر كامل.'
        };

        let currentNet = '', clientName = '', clientPhone = '';

        function copyCashNumber(num) {
            navigator.clipboard.writeText(num).then(() => { alert('👑 تم نسخ رقم كاش EL KING بنجاح: ' + num); });
        }

        function handleLogin() {
            const name = document.getElementById('login-name').value.trim();
            const phone = document.getElementById('login-phone').value.trim();
            if(!name || !phone) { alert('من فضلك ادخل البيانات أولاً!'); return; }
            clientName = name; clientPhone = phone;
            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-networks').classList.remove('hidden');
        }

        function chooseNetwork(net) {
            currentNet = net;
            document.getElementById('selected-net').innerText = net;
            let notesBox = document.getElementById('company-notes');
            if(companyNotesData[net]) { notesBox.innerHTML = companyNotesData[net]; notesBox.classList.remove('hidden'); } else { notesBox.classList.add('hidden'); }

            if(net === 'فودافون') {
                document.getElementById('package-container').classList.add('hidden');
                document.getElementById('coming-soon-container').classList.remove('hidden');
            } else {
                document.getElementById('coming-soon-container').classList.add('hidden');
                document.getElementById('package-container').classList.remove('hidden');
                let select = document.getElementById('package-select'); select.innerHTML = '';
                backupPackages[net].forEach(p => {
                    let opt = document.createElement('option'); opt.value = p; opt.innerText = p; select.appendChild(opt);
                });
            }
            document.getElementById('step-networks').classList.add('hidden');
            document.getElementById('step-details').classList.remove('hidden');
        }

        function goBackToNetworks() { document.getElementById('step-details').classList.add('hidden'); document.getElementById('step-networks').classList.remove('hidden'); }
        function logout() { location.reload(); }

        async function sendOrder() {
            const pkg = document.getElementById('package-select').value;
            const phone = document.getElementById('user-phone').value;
            const imgFile = document.getElementById('payment-img').files[0];
            if(!phone || !imgFile) { alert('اكمل البيانات أولاً!'); return; }

            alert('جاري إرسال طلبك الفخم لـ EL KING...');
            const message = `👑 طلب شحن ملكي جديد 👑\n\n👤 العميل: ${clientName}\n📱 حساب العميل: ${clientPhone}\n\n⚙️ التفاصيل:\n🔹 الشركة: ${currentNet}\n🔹 الباقة: ${pkg}\n🔹 الرقم المراد شحنه: ${phone}`;
            
            const replyMarkup = {
                inline_keyboard: [
                    [{ text: '✅ تم الشحن بنجاح', callback_data: 'done' }],
                    [{ text: '❌ تم الرفض (الأسكرين غلط)', callback_data: 'reject' }]
                ]
            };

            for (let token of BOT_TOKENS) {
                for (let adminId of ADMIN_IDS) {
                    const formData = new FormData();
                    formData.append('chat_id', adminId);
                    formData.append('photo', imgFile);
                    formData.append('caption', message);
                    formData.append('reply_markup', JSON.stringify(replyMarkup));
                    try { await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData }); } catch (e) {}
                }
            }
            alert('تم إرسال طلبك بنجاح! سيقوم الآدمن بمراجعته فوراً.');
            location.reload();
        }
    </script>
</body>
</html>
