<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منصة الشحن الموحدة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-950: #0b1220;
    --navy-900: #0f1b2e;
    --navy-800: #16243b;
    --navy-700: #1e3050;
    --gold-500: #c9a24b;
    --gold-400: #ddbd6f;
    --text-primary: #eef2f7;
    --text-muted: #9fb0c3;
    --danger: #e2555a;
    --success: #3fae6b;
    --radius-lg: 18px;
    --radius-md: 12px;
    --shadow-elevated: 0 20px 45px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
    background: radial-gradient(circle at top, var(--navy-800), var(--navy-950) 65%);
    color: var(--text-primary);
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 6vw;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: var(--navy-950);
    font-size: 18px;
  }

  .brand-title { font-weight: 800; font-size: 19px; letter-spacing: 0.2px; }
  .brand-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .status-pill {
    width: fit-content;
    font-size: 12.5px;
    color: var(--success);
    background: rgba(63, 174, 107, 0.12);
    border: 1px solid rgba(63, 174, 107, 0.35);
    padding: 6px 14px;
    border-radius: 999px;
    display: none;
    align-items: center;
    gap: 6px;
  }
  .status-pill.visible { display: inline-flex; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }

  main { max-width: 1180px; margin: 0 auto; padding: 48px 6vw 90px; }

  /* ---------- AUTH SECTION ---------- */
  #auth-section {
    display: flex;
    justify-content: center;
    padding-top: 4vh;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  #auth-section.hidden-fade {
    opacity: 0;
    transform: translateY(-16px) scale(0.98);
    pointer-events: none;
    position: absolute;
    inset: 0;
    height: 0;
    overflow: hidden;
  }

  .auth-card {
    width: 100%;
    max-width: 440px;
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius-lg);
    padding: 38px 34px 32px;
    box-shadow: var(--shadow-elevated);
    backdrop-filter: blur(6px);
  }

  .auth-heading { text-align: center; margin-bottom: 26px; }
  .auth-heading h1 { font-size: 21px; margin: 0 0 6px; font-weight: 800; }
  .auth-heading p { margin: 0; color: var(--text-muted); font-size: 13.5px; }

  .tab-switch { display: flex; background: rgba(255,255,255,0.05); border-radius: 999px; padding: 4px; margin-bottom: 26px; }
  .tab-switch button {
    flex: 1; border: none; background: transparent; color: var(--text-muted);
    font-family: inherit; font-weight: 700; font-size: 14px; padding: 10px 0;
    border-radius: 999px; cursor: pointer; transition: background 0.25s ease, color 0.25s ease;
  }
  .tab-switch button.active { background: linear-gradient(135deg, var(--gold-500), var(--gold-400)); color: var(--navy-950); }

  .field-group { margin-bottom: 18px; }
  .field-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
  
  /* ستايل حقل الباسورد مع العين */
  .password-wrapper { position: relative; display: flex; align-items: center; }
  .password-wrapper input { padding-left: 45px; }
  .toggle-password-btn {
    position: absolute; left: 12px; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 16px; outline: none;
    padding: 4px; display: flex; align-items: center; justify-content: center;
  }

  .field-group input {
    width: 100%; padding: 13px 15px; border-radius: var(--radius-md);
    border: 1px solid rgba(255,255,255,0.12); background: rgba(6, 12, 22, 0.55);
    color: var(--text-primary); font-family: inherit; font-size: 14.5px; outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .field-group input::placeholder { color: rgba(159, 176, 195, 0.55); }
  .field-group input:focus { border-color: var(--gold-500); box-shadow: 0 0 0 3px rgba(201, 162, 75, 0.18); }
  .field-group input.invalid { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(226, 85, 90, 0.15); }

  .field-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .field-error { font-size: 12.5px; color: var(--danger); margin-top: 6px; display: none; }
  .field-error.visible { display: block; }

  .form-alert { font-size: 13px; padding: 11px 14px; border-radius: var(--radius-md); margin-bottom: 18px; display: none; }
  .form-alert.error { background: rgba(226, 85, 90, 0.12); border: 1px solid rgba(226, 85, 90, 0.35); color: #ff9a9d; }
  .form-alert.success { background: rgba(63, 174, 107, 0.12); border: 1px solid rgba(63, 174, 107, 0.35); color: #7fe0a5; }
  .form-alert.visible { display: block; }

  .submit-btn {
    width: 100%; padding: 14px 0; border: none; border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--gold-500), var(--gold-400)); color: var(--navy-950);
    font-family: inherit; font-weight: 800; font-size: 15px; cursor: pointer;
    transition: filter 0.2s ease, transform 0.15s ease; margin-top: 4px;
  }
  .submit-btn:hover { filter: brightness(1.06); }
  .submit-btn:active { transform: translateY(1px); }

  .auth-form { display: none; }
  .auth-form.active { display: block; }

  /* ---------- DASHBOARD SECTION ---------- */
  #dashboard-section { display: none; opacity: 0; transform: translateY(14px); transition: opacity 0.5s ease, transform 0.5s ease; }
  #dashboard-section.revealed { display: block; opacity: 1; transform: translateY(0); }

  .dash-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 36px; }
  .dash-welcome h2 { margin: 0 0 6px; font-size: 24px; font-weight: 800; }
  .dash-welcome p { margin: 0; color: var(--text-muted); font-size: 14px; }

  .logout-btn {
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
    color: var(--text-primary); font-family: inherit; font-weight: 700; font-size: 13.5px;
    padding: 10px 20px; border-radius: 999px; cursor: pointer; transition: background 0.2s ease, border-color 0.2s ease;
  }
  .logout-btn:hover { background: rgba(226, 85, 90, 0.12); border-color: rgba(226, 85, 90, 0.4); }

  .section-heading { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .section-heading h3 { font-size: 17px; font-weight: 800; margin: 0; }
  .section-heading span { font-size: 12.5px; color: var(--text-muted); }

  .telecom-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-bottom: 46px; }
  .telecom-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .telecom-card:hover { transform: translateY(-4px); border-color: rgba(201, 162, 75, 0.4); box-shadow: 0 16px 32px rgba(0,0,0,0.3); }

  .telecom-logo {
    width: 120px; height: 120px; border-radius: 50%; overflow: hidden; background: #ffffff;
    border: 3px solid rgba(201, 162, 75, 0.35); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .telecom-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .telecom-name { font-weight: 800; font-size: 15.5px; }
  .telecom-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.6; }
  .telecom-tag {
    font-size: 11.5px; font-weight: 700; padding: 4px 12px; border-radius: 999px;
    background: rgba(201, 162, 75, 0.12); color: var(--gold-400); border: 1px solid rgba(201, 162, 75, 0.3);
  }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
  .info-card { background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 22px; }
  .info-card h4 { margin: 0 0 10px; font-size: 14.5px; font-weight: 800; }
  .info-card p { margin: 0; font-size: 13px; color: var(--text-muted); line-height: 1.8; }

  footer { text-align: center; padding: 26px 0 10px; color: var(--text-muted); font-size: 12.5px; }

  @media (max-width: 560px) {
    .auth-card { padding: 30px 22px 26px; }
    .top-bar { padding: 18px 5vw; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <div class="brand-mark">EK</div>
    <div>
      <div class="brand-title">منصة الشحن الموحدة</div>
      <div class="brand-subtitle">EL KING Unified Recharge Platform</div>
    </div>
  </div>
  <div id="session-pill" class="status-pill">
    <span class="status-dot"></span>
    <span id="session-pill-text">متصل الآن</span>
  </div>
</div>

<main>
  <section id="auth-section">
    <div class="auth-card">
      <div class="auth-heading">
        <h1>الوصول إلى حسابك</h1>
        <p>يرجى تسجيل الدخول أو إنشاء حساب جديد لمتابعة استخدام المنصة</p>
      </div>

      <div class="tab-switch">
        <button type="button"
