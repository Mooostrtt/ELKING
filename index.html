<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منصة الشحن الموحدة - EL KING</title>

<style>
/* =========================================================
   EL KING — Premium Dark Luxury Theme
   Deep navy background with glowing gold accents.
   No user-select / screenshot restrictions are applied anywhere.
   ========================================================= */

:root {
    --bg-deep: #0b1220;
    --bg-panel: #101a2e;
    --bg-panel-2: #131f38;
    --border-soft: rgba(201, 162, 75, 0.18);
    --border-strong: rgba(201, 162, 75, 0.4);

    --gold: #c9a24b;
    --gold-light: #ddbd6f;
    --gold-glow: rgba(221, 189, 111, 0.35);

    --text-main: #f5f2ea;
    --text-dim: #a9b2c3;
    --text-faint: #6d7690;

    --success: #4ade80;
    --error: #f87171;

    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;

    --shadow-elevated: 0 20px 45px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    --shadow-gold-glow: 0 8px 30px -6px rgba(201, 162, 75, 0.35);
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
}

body {
    background: radial-gradient(1200px 800px at 50% -10%, #14203a 0%, var(--bg-deep) 55%, #070b14 100%);
    color: var(--text-main);
    font-family: "Segoe UI", "Cairo", "Tahoma", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.topbar {
    width: 100%;
    max-width: 1100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    padding: 28px 20px 18px;
    text-align: center;
}

.topbar h1 {
    margin: 0;
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    letter-spacing: 0.3px;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(221, 189, 111, 0.25);
}

.topbar .tagline {
    margin-top: 6px;
    font-size: 13.5px;
    color: var(--text-dim);
}

.auth-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-dim);
    flex-wrap: wrap;
    justify-content: center;
}

.auth-status span {
    color: var(--gold-light);
    font-weight: 600;
}

.auth-status button {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--gold-light);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s ease;
}

.auth-status button:hover {
    background: rgba(201, 162, 75, 0.1);
    box-shadow: 0 0 14px var(--gold-glow);
}

/* Tabs */
nav.tabs {
    width: 100%;
    max-width: 1100px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 4px 16px 8px;
    margin-bottom: 10px;
}

nav.tabs button {
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
}

nav.tabs button:hover {
    color: var(--text-main);
    border-color: var(--border-strong);
}

nav.tabs button.active {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: #201607;
    border-color: transparent;
    box-shadow: var(--shadow-gold-glow);
}

/* Main / Views */
main {
    width: 100%;
    max-width: 1100px;
    padding: 10px 20px 60px;
    display: flex;
    justify-content: center;
}

.view {
    display: none;
    width: 100%;
    animation: fadeUp 0.35s ease;
}

.view.active {
    display: block;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Wallet banner */
.wallet-banner {
    background: linear-gradient(135deg, var(--bg-panel-2) 0%, #16233f 100%);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 22px 26px;
    margin-bottom: 26px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    box-shadow: var(--shadow-elevated);
    text-align: center;
}

.wallet-banner div:first-child {
    color: var(--text-dim);
    font-size: 14.5px;
    flex: 1 1 220px;
}

.wallet-banner strong { color: var(--gold-light); }

.wallet-banner .num {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--gold-light);
    text-shadow: 0 0 18px var(--gold-glow);
    direction: ltr;
}

/* Company grid & packages */
.company-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 22px;
}

.company-card {
    position: relative;
    background: linear-gradient(160deg, var(--bg-panel) 0%, #0d1526 100%);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 24px 22px 20px;
    box-shadow: var(--shadow-elevated);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    overflow: hidden;
}

.company-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(221, 189, 111, 0.5), transparent 40%, transparent 60%, rgba(221, 189, 111, 0.25));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    opacity: 0.6;
}

.company-card:hover {
    transform: translateY(-4px);
    border-color: var(--border-strong);
    box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6), 0 0 26px -6px var(--gold-glow);
}

.company-card h3 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
}

.company-card ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.company-card li {
    background: rgba(201, 162, 75, 0.06);
    border: 1px solid rgba(201, 162, 75, 0.12);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14.5px;
    color: var(--text-main);
    transition: background 0.25s ease, border-color 0.25s ease;
}

.company-card li:hover {
    background: rgba(201, 162, 75, 0.12);
    border-color: var(--border-strong);
}

.company-card li.empty-note {
    background: transparent;
    border: 1px dashed var(--border-soft);
    color: var(--text-faint);
    text-align: center;
}

.empty-note {
    color: var(--text-faint);
    font-size: 14px;
    text-align: center;
    padding: 30px 10px;
    grid-column: 1 / -1;
}

/* Cards (login / register / profile) */
.card {
    max-width: 440px;
    margin: 0 auto;
    background: linear-gradient(160deg, var(--bg-panel) 0%, #0d1526 100%);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    box-shadow: var(--shadow-elevated);
}

.card h2 {
    margin: 0 0 22px;
    text-align: center;
    font-size: 21px;
    font-weight: 700;
    color: var(--gold-light);
}

.field { margin-bottom: 18px; }

.field label {
    display: block;
    margin-bottom: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-dim);
}

.field input {
    width: 100%;
    background: #0b1424;
    border: 1px solid var(--border-soft);
    color: var(--text-main);
    padding: 13px 14px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
}

.field input::placeholder { color: var(--text-faint); }
.field input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201, 162, 75, 0.15); }

.password-wrap { position: relative; display: flex; align-items: center; }
.password-wrap input { padding-inline-end: 46px; }

.toggle-password {
    position: absolute;
    inset-inline-end: 6px;
    background: transparent;
    border: none;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    color: var(--text-dim);
    transition: color 0.2s ease, background 0.2s ease;
}

.toggle-password:hover { color: var(--gold-light); background: rgba(201, 162, 75, 0.1); }

button.submit {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: #201607;
    border: none;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow: var(--shadow-gold-glow);
}

button.submit:hover {
    transform: translateY(-2px);
    filter: brightness(1.06);
    box-shadow: 0 12px 34px -6px rgba(221, 189, 111, 0.55);
}

button.submit:active { transform: translateY(0); }

.form-message { margin-top: 16px; text-align: center; font-size: 14px; min-height: 20px; }
.form-message.success { color: var(--success); }
.form-message.error { color: var(--error); }

/* Profile */
.profile-box .name { font-size: 20px; font-weight: 700; color: var(--gold-light); text-align: center; margin-bottom: 14px; }
.profile-box p { text-align: center; color: var(--text-main); font-size: 15px; margin: 8px 0; }
.profile-box .empty-note { padding: 10px; }

/* Footer */
footer {
    width: 100%;
    text-align: center;
    padding: 22px 20px 34px;
    color: var(--text-faint);
    font-size: 13px;
    border-top: 1px solid var(--border-soft);
    margin-top: auto;
}

/* Responsive */
@media (max-width: 640px) {
    .topbar { text-align: center; justify-content: center; padding-top: 22px; }
    nav.tabs { gap: 6px; }
    nav.tabs button { padding: 9px 14px; font-size: 13.5px; }
    .wallet-banner { flex-direction: column; text-align: center; padding: 18px; }
    .company-grid { grid-template-columns: 1fr; }
    .card { padding: 26px 20px; }
}

@media (max-width: 380px) {
    .topbar h1 { font-size: 20px; }
    .card h2 { font-size: 19px; }
}
</style>
</head>
<body>

<header class="topbar">
    <div>
        <h1>🏢 منصة الشحن الموحدة</h1>
        <div class="tagline">شحن رصيد وباقات WE / Orange / Etisalat / Vodafone في مكان واحد</div>
    </div>
    <div class="auth-status" id="authStatus"></div>
</header>

<nav class="tabs">
    <button data-view="home" class="active">📦 الباقات</button>
    <button data-view="login">🔐 تسجيل الدخول</button>
    <button data-view="register">🆕 حساب جديد</button>
    <button data-view="profile">👤 حسابي</button>
</nav>

<main>
    <section class="view active" id="view-home">
        <div class="wallet-banner">
            <div>
                💳 حوّل قيمة الطلب على محفظة <strong>Vodafone Cash / Etisalat Cash / Orange Cash</strong>
            </div>
            <div class="num" id="walletNumber">—</div>
        </div>

        <div class="company-grid" id="companyGrid">
            <p class="empty-note">جارِ تحميل الباقات...</p>
        </div>
    </section>

    <section class="view" id="view-login">
        <div class="card">
            <h2>🔐 تسجيل الدخول</h2>
            <form id="loginForm">
                <div class="field">
                    <label>رقم الهاتف</label>
                    <input type="tel" name="phone" required placeholder="01xxxxxxxxx" />
                </div>
                <div class="field">
                    <label>كلمة المرور</label>
                    <div class="password-wrap">
                        <input type="password" name="password" id="loginPassword" required minlength="4" />
                        <button type="button" class="toggle-password" data-target="loginPassword" aria-label="إظهار/إخفاء كلمة المرور">👁️</button>
                    </div>
                </div>
                <button type="submit" class="submit">دخول</button>
            </form>
            <div class="form-message" id="loginMessage"></div>
        </div>
    </section>

    <section class="view" id="view-register">
        <div class="card">
            <h2>🆕 إنشاء حساب جديد</h2>
            <form id="registerForm">
                <div class="field">
                    <label>الاسم</label>
                    <input type="text" name="name" required />
                </div>
                <div class="field">
                    <label>رقم الهاتف</label>
                    <input type="tel" name="phone" required placeholder="01xxxxxxxxx" />
                </div>
                <div class="field">
                    <label>كلمة المرور</label>
                    <div class="password-wrap">
                        <input type="password" name="password" id="registerPassword" required minlength="4" />
                        <button type="button" class="toggle-password" data-target="registerPassword" aria-label="إظهار/إخفاء كلمة المرور">👁️</button>
                    </div>
                </div>
                <button type="submit" class="submit">تسجيل</button>
            </form>
            <div class="form-message" id="registerMessage"></div>
        </div>
    </section>

    <section class="view" id="view-profile">
        <div class="card profile-box" id="profileBox">
            <p class="empty-note">يرجى تسجيل الدخول لعرض بيانات حسابك.</p>
        </div>
    </section>
</main>

<footer>
    &copy; <span id="year"></span> منصة الشحن الموحدة — جميع الحقوق محفوظة
</footer>

<script src="app.js"></script>
</body>
</html>
