<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منصة الشحن الموحدة - EL KING</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
    <div>
        <h1>🏢 منصة الشحن الموحدة</h1>
        <div class="tagline">شحن رصيد وباقات WE / Orange / Etisalat / Vodafone في مكان واحد</div>
    </div>
    <div class="auth-status" id="authStatus"></div>
</header>

<nav class="tabs">
    <button data-view="home" class="active">📦 الباقات</button>
    <button data-view="login">🔐 تسجيل الدخول</button>
    <button data-view="register">🆕 حساب جديد</button>
    <button data-view="profile">👤 حسابي</button>
</nav>

<main>

    <section class="view active" id="view-home">
        <div class="wallet-banner">
            <div>
                💳 حوّل قيمة الطلب على محفظة <strong>Vodafone Cash / Etisalat Cash / Orange Cash</strong>
            </div>
            <div class="num" id="walletNumber">—</div>
        </div>

        <div class="company-grid" id="companyGrid">
            <p class="empty-note">جارِ تحميل الباقات...</p>
        </div>
    </section>

    <section class="view" id="view-login">
        <div class="card">
            <h2>🔐 تسجيل الدخول</h2>
            <form id="loginForm">
                <div class="field">
                    <label>رقم الهاتف</label>
                    <input type="tel" name="phone" required placeholder="01xxxxxxxxx" />
                </div>
                <div class="field">
                    <label>كلمة المرور</label>
                    <div class="password-wrap">
                        <input type="password" name="password" id="loginPassword" required minlength="4" />
                        <button type="button" class="toggle-password" data-target="loginPassword" aria-label="إظهار/إخفاء كلمة المرور">👁️</button>
                    </div>
                </div>
                <button type="submit" class="submit">دخول</button>
            </form>
            <div class="form-message" id="loginMessage"></div>
        </div>
    </section>

    <section class="view" id="view-register">
        <div class="card">
            <h2>🆕 إنشاء حساب جديد</h2>
            <form id="registerForm">
                <div class="field">
                    <label>الاسم</label>
                    <input type="text" name="name" required />
                </div>
                <div class="field">
                    <label>رقم الهاتف</label>
                    <input type="tel" name="phone" required placeholder="01xxxxxxxxx" />
                </div>
                <div class="field">
                    <label>كلمة المرور</label>
                    <div class="password-wrap">
                        <input type="password" name="password" id="registerPassword" required minlength="4" />
                        <button type="button" class="toggle-password" data-target="registerPassword" aria-label="إظهار/إخفاء كلمة المرور">👁️</button>
                    </div>
                </div>
                <button type="submit" class="submit">تسجيل</button>
            </form>
            <div class="form-message" id="registerMessage"></div>
        </div>
    </section>

    <section class="view" id="view-profile">
        <div class="card profile-box" id="profileBox">
            <p class="empty-note">يرجى تسجيل الدخول لعرض بيانات حسابك.</p>
        </div>
    </section>

</main>

<footer>
    &copy; <span id="year"></span> منصة الشحن الموحدة — جميع الحقوق محفوظة
</footer>

<script src="app.js"></script>
</body>
</html>
